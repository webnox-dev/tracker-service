services:
  tracker-postgres:
    image: postgres:16-alpine
    container_name: tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tracker_service}
    ports:
      - '${POSTGRES_PORT:-5437}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tracker_service}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tracker_postgres_data:/var/lib/postgresql/data

  tracker-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker-service
    restart: unless-stopped
    depends_on:
      tracker-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@tracker-postgres:5432/${POSTGRES_DB:-tracker_service}?schema=public
    ports:
      - '${PORT:-3001}:3001'

volumes:
  tracker_postgres_data:
